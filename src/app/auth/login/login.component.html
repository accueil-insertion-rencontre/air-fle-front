<div class="login-container">
  <div class="login-overlay">
    <div class="login-card">
      <div class="login-header">
        <h2>Re !</h2>
        <p>Entrez votre email et mot de passe</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Message d'erreur -->
        <div *ngIf="error" class="alert alert-danger">
          {{ error }}
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="Votre adresse email"
            autocomplete="email"
            [ngClass]="{
              'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched,
            }"
          />
          <div
            *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            class="error-message"
          >
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email est requis</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Format d'email invalide</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Votre mot de passe"
            autocomplete="current-password"
            [ngClass]="{
              'is-invalid':
                loginForm.get('password')?.invalid && loginForm.get('password')?.touched,
            }"
          />
          <div
            *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            class="error-message"
          >
            <span *ngIf="loginForm.get('password')?.errors?.['required']"
              >Mot de passe est requis</span
            >
          </div>
        </div>

        <div class="remember-me">
          <label class="switch">
            <input
              type="checkbox"
              [(ngModel)]="rememberMe"
              [ngModelOptions]="{ standalone: true }"
            />
            <span class="slider round"></span>
          </label>
          <span>Se souvenir de moi</span>
        </div>

        <button type="submit" class="login-button" [disabled]="loginForm.invalid || loading">
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading">Connexion en cours...</span>
        </button>
      </form>

      <div class="login-footer">
        <img src="/assets/img/auth/icone.png" alt="AIR Logo" class="logo" />
      </div>
    </div>
  </div>
</div>
