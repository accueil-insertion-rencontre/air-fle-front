<div class="sidebar" [class.collapsed]="!isOpen">
  <div class="sidebar-header">
    <div class="logo-container">
      <img src="/assets/img/auth/icone.png" alt="AIR Logo" class="logo" />
      <h1 class="brand-text">AIR</h1>
    </div>
    <!-- Bouton de fermeture visible uniquement en mobile -->
    <button class="close-button mobile-only" (click)="toggleSidebar()">
      <span>×</span>
    </button>
  </div>

  <div class="sidebar-menu">
    <ul class="menu-list">
      <!-- Parcourir les éléments de menu en tenant compte des sections -->
      <ng-container *ngFor="let item of menuItems; let i = index">
        <!-- Afficher le titre de la section si présent -->
        <li class="menu-section" *ngIf="item.section">
          <span class="section-title">{{ item.section }}</span>
        </li>

        <!-- Afficher l'élément du menu -->
        <li class="menu-item" [class.active]="item.active">
          <a
            [routerLink]="item.route"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          >
            <div class="menu-icon-container">
              <i [attr.data-feather]="item.icon" class="feather"></i>
            </div>
            <span class="menu-text">{{ item.label }}</span>
          </a>
        </li>
      </ng-container>
    </ul>
  </div>
</div>
