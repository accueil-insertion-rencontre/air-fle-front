<div class="dashboard-home">
  <header class="dashboard-header">
    <div class="title-area">
      <h1>Dashboard</h1>
    </div>
  </header>

  <!-- Cartes Statistiques -->
  <div class="stats-grid">
    <div class="stat-card" *ngFor="let card of statCards">
      <div class="stat-content">
        <div class="stat-title">{{ card.title }}</div>
        <div class="stat-value">{{ card.value }}</div>
        <div class="stat-change" *ngIf="card.change !== null" [ngClass]="{'positive': card.change > 0, 'negative': card.change < 0}">
          {{ card.change > 0 ? '+' : '' }}{{ card.change }}%
        </div>
      </div>
      <div class="stat-icon" [style.background-color]="card.color">
        <i [attr.data-feather]="card.icon"></i>
      </div>
    </div>
  </div>

  <!-- Graphique Semaine d'enseignement -->
  <div class="chart-container">
    <h2>Semaine d'enseignement</h2>
    <div class="chart-placeholder">
      <p>Aucune donnée disponible pour le moment</p>
    </div>
  </div>

  <!-- Section du bas: TO-DO List et Modules -->
  <div class="dashboard-bottom">
    <!-- TO-DO List -->
    <div class="todo-container">
      <div class="section-header">
        <h2>TO-DO-LIST</h2>
        <span class="badge">0 done this month</span>
      </div>
      <div class="todo-list empty-state">
        <p>Aucune tâche pour le moment</p>
      </div>
    </div>

    <!-- Modules de la journée -->
    <div class="modules-container">
      <div class="section-header">
        <h2>Modules de la journée</h2>
      </div>
      <div class="modules-list empty-state">
        <p>Aucun cours prévu aujourd'hui</p>
      </div>
    </div>
  </div>
</div>
