<div class="filters-container">
  <div class="filters-grid">
    <div class="filter-group">
      <label for="level">Niveau</label>
      <select 
        id="level" 
        [(ngModel)]="filters.level"
        (ngModelChange)="onFiltersChange()"
      >
        <option value="">Tous les niveaux</option>
        <option *ngFor="let level of levels" [value]="level.code">
          {{ level.name }}
        </option>
      </select>
    </div>

    <div class="filter-group">
      <label for="status">Statut</label>
      <select 
        id="status" 
        [(ngModel)]="filters.status"
        (ngModelChange)="onFiltersChange()"
      >
        <option value="">Tous les statuts</option>
        <option *ngFor="let status of statuses" [value]="status.code">
          {{ status.name }}
        </option>
      </select>
    </div>

    <div class="filter-group">
      <label for="nationality">Nationalité</label>
      <select 
        id="nationality" 
        [(ngModel)]="filters.nationality"
        (ngModelChange)="onFiltersChange()"
      >
        <option value="">Toutes les nationalités</option>
        <option *ngFor="let nat of nationalities" [value]="nat.code">
          {{ nat.name }}
        </option>
      </select>
    </div>
  </div>

  <div class="filters-actions">
    <button class="btn-clear" (click)="clearFilters()">
      Réinitialiser les filtres
    </button>
  </div>
</div>
