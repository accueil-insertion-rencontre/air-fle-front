<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 title-text fw-bold">Groupes</h1>
    <a [routerLink]="['/dashboard/groups/create']" class="btn btn-primary">
      <i class="fas fa-plus me-2"></i> NOUVEAU GROUPE
    </a>
  </div>

  <div class="card mb-4">
    <div class="card-body p-0">
      <!-- Loading indicator -->
      <div *ngIf="loading" class="text-center my-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="mt-2">Chargement des groupes...</p>
      </div>

      <!-- Bootstrap Table -->
      <table id="groupTable" class="table align-items-center mb-0"></table>
    </div>
  </div>
</div>

<!-- Modal pour créer un groupe -->
<div
  class="modal fade"
  id="createGroupModal"
  tabindex="-1"
  aria-labelledby="createGroupModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createGroupModalLabel">Créer un nouveau groupe</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Fermer"
        ></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="groupForm" (ngSubmit)="onSubmit()">
          <!-- Message d'erreur général -->
          <div *ngIf="error" class="alert alert-danger">
            {{ error }}
          </div>

          <!-- Nom du groupe -->
          <div class="mb-3">
            <label for="label" class="form-label"
              >Nom du groupe <span class="text-danger">*</span></label
            >
            <input
              type="text"
              class="form-control"
              id="label"
              formControlName="label"
              [ngClass]="{ 'is-invalid': isFieldInvalid('label') }"
            />
            <div *ngIf="isFieldInvalid('label')" class="invalid-feedback">
              <div *ngIf="f['label'].errors?.['required']">Le nom du groupe est obligatoire</div>
              <div *ngIf="f['label'].errors?.['minlength']">
                Le nom doit comporter au moins 3 caractères
              </div>
              <div *ngIf="f['label'].errors?.['maxlength']">
                Le nom ne peut pas dépasser 255 caractères
              </div>
            </div>
          </div>

          <!-- Session -->
          <div class="mb-3">
            <label for="session_id" class="form-label"
              >Session <span class="text-danger">*</span></label
            >
            <select
              class="form-select"
              id="session_id"
              formControlName="session_id"
              [ngClass]="{ 'is-invalid': isFieldInvalid('session_id') }"
            >
              <option [ngValue]="null" disabled>Sélectionnez une session</option>
              <option *ngFor="let session of sessions" [value]="session.session_uuid || session.id">
                {{ session.label }}
              </option>
            </select>
            <div *ngIf="isFieldInvalid('session_id')" class="invalid-feedback">
              Veuillez sélectionner une session
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="resetForm()"
          data-bs-dismiss="modal"
        >
          Annuler
        </button>
        <button
          type="button"
          class="btn btn-primary"
          (click)="onSubmit()"
          [disabled]="loading || groupForm.invalid"
        >
          <span
            *ngIf="loading"
            class="spinner-border spinner-border-sm me-2"
            role="status"
            aria-hidden="true"
          ></span>
          <i *ngIf="!loading" class="fas fa-save me-2"></i>
          Enregistrer
        </button>
      </div>
    </div>
  </div>
</div>
