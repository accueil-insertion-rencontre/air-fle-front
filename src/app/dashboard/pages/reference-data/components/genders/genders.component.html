<div class="genders-container">
  <!-- Actions -->
  <div class="genders-actions">
    <button class="back-btn" (click)="goBack()">
      <span class="btn-icon">←</span>
      Retour
    </button>

    <h2>👥 Genres</h2>

    <button class="create-btn" (click)="openCreateModal()">
      <span class="btn-icon">+</span>
      Ajouter un genre
    </button>
  </div>

  <!-- Message d'erreur -->
  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
    <button (click)="error = null" class="close-error">×</button>
  </div>

  <!-- Contenu principal -->
  <div class="genders-content">
    <div class="genders-list">
      <!-- En-tête du tableau -->
      <div class="genders-header">
        <div class="column name">LIBELLÉ</div>
        <div class="column actions">ACTIONS</div>
      </div>

      <!-- Loading -->
      <div *ngIf="isLoading" class="loading-indicator">
        <div class="spinner"></div>
        <span>Chargement des genres...</span>
      </div>

      <!-- Liste des genres -->
      <div *ngFor="let gender of genders; trackBy: trackByGenderId" class="gender-item">
        <div class="column name">
          <div class="gender-name">{{ gender.label }}</div>
        </div>

        <div class="column actions">
          <button class="edit-btn" (click)="openEditModal(gender)">Modifier</button>
          <button class="delete-btn" (click)="deleteGender(gender)">Supprimer</button>
        </div>
      </div>

      <!-- État vide -->
      <div *ngIf="!isLoading && genders.length === 0" class="empty-state">
        <p>Aucun genre trouvé</p>
        <button class="create-btn" (click)="openCreateModal()">
          <span class="btn-icon">+</span>
          Ajouter un genre
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de création -->
<div class="modal-overlay" *ngIf="isCreateModalOpen" (click)="closeCreateModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Ajouter un genre</h2>
      <button class="close-btn" (click)="closeCreateModal()">×</button>
    </div>

    <div class="modal-body">
      <form [formGroup]="createForm" (ngSubmit)="createGender()">
        <div class="form-group">
          <label for="createLabel">Libellé *</label>
          <input
            id="createLabel"
            type="text"
            formControlName="label"
            placeholder="Ex: Homme, Femme, Autre..."
            [class.error]="createLabel?.invalid && createLabel?.touched"
          />
          <div *ngIf="createLabel?.invalid && createLabel?.touched" class="error-text">
            <span *ngIf="createLabel?.hasError('required')">Le libellé est requis</span>
            <span *ngIf="createLabel?.hasError('minlength')"
              >Le libellé doit contenir au moins 2 caractères</span
            >
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="closeCreateModal()">Annuler</button>
          <button type="submit" class="submit-btn" [disabled]="createForm.invalid">Créer</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal d'édition -->
<div class="modal-overlay" *ngIf="isEditModalOpen" (click)="closeEditModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Modifier le genre</h2>
      <button class="close-btn" (click)="closeEditModal()">×</button>
    </div>

    <div class="modal-body">
      <form [formGroup]="editForm" (ngSubmit)="updateGender()">
        <div class="form-group">
          <label for="editLabel">Libellé *</label>
          <input
            id="editLabel"
            type="text"
            formControlName="label"
            placeholder="Ex: Homme, Femme, Autre..."
            [class.error]="editLabel?.invalid && editLabel?.touched"
          />
          <div *ngIf="editLabel?.invalid && editLabel?.touched" class="error-text">
            <span *ngIf="editLabel?.hasError('required')">Le libellé est requis</span>
            <span *ngIf="editLabel?.hasError('minlength')"
              >Le libellé doit contenir au moins 2 caractères</span
            >
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="cancel-btn" (click)="closeEditModal()">Annuler</button>
          <button type="submit" class="submit-btn" [disabled]="editForm.invalid">
            Sauvegarder
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
