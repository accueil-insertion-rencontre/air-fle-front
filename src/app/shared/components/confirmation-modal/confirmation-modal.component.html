<!-- Modal de confirmation -->
<div
  class="modal fade"
  id="confirmationModal"
  tabindex="-1"
  aria-labelledby="confirmationModalLabel"
  aria-hidden="true"
  *ngIf="config"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <div class="d-flex align-items-center">
          <i [class]="getIconClass()" style="font-size: 1.5rem; margin-right: 0.75rem"></i>
          <h5 class="modal-title mb-0" id="confirmationModalLabel">{{ config.title }}</h5>
        </div>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Fermer"
          (click)="onCancel()"
        ></button>
      </div>
      <div class="modal-body pt-2">
        <p class="mb-0">{{ config.message }}</p>
      </div>
      <div class="modal-footer border-0 pt-2">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">
          {{ config.cancelText }}
        </button>
        <button type="button" [class]="'btn ' + getButtonClass()" (click)="onConfirm()">
          {{ config.confirmText }}
        </button>
      </div>
    </div>
  </div>
</div>
